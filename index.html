<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velorex Tech | AI-Powered Technology Solutions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            velorex: {
              bg: '#050510',
              surface: '#0a0a1a',
              card: '#0f0f23',
              border: '#1a1a35',
              accent: '#00d4ff',
              accent2: '#7c3aed',
              muted: '#6b7280',
              text: '#e5e7eb',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Space Grotesk', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050510;
      color: #e5e7eb;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a1a;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00d4ff, #7c3aed);
      border-radius: 4px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    @keyframes pulse-glow {
      0%, 100% { 
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(124, 58, 237, 0.2);
      }
      50% { 
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.5), 0 0 80px rgba(124, 58, 237, 0.4);
      }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
    }

    .animate-fade-in-down {
      animation: fadeInDown 0.8s ease-out forwards;
      opacity: 0;
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    .animate-pulse-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient-shift 8s ease infinite;
    }

    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    .delay-600 { animation-delay: 0.6s; }
    .delay-800 { animation-delay: 0.8s; }

    .gradient-text {
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #00d4ff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 4s linear infinite;
    }

    .gradient-text-warm {
      background: linear-gradient(135deg, #00d4ff 0%, #06b6d4 25%, #22d3ee 50%, #67e8f9 75%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glass {
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 212, 255, 0.1);
    }

    .glass-strong {
      background: rgba(10, 10, 26, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(0, 212, 255, 0.15);
    }

    .glow-border {
      position: relative;
      background: linear-gradient(#0f0f23, #0f0f23) padding-box,
                  linear-gradient(135deg, #00d4ff, #7c3aed, #00d4ff) border-box;
      border: 2px solid transparent;
      border-radius: 16px;
    }

    .glow-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #00d4ff, #7c3aed, #00d4ff);
      border-radius: 18px;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .glow-border:hover::before {
      opacity: 0.5;
      filter: blur(15px);
    }

    .btn-primary {
      position: relative;
      background: linear-gradient(135deg, #00d4ff 0%, #0891b2 100%);
      color: #050510;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(0, 212, 255, 0.4);
    }

    .btn-secondary {
      position: relative;
      background: transparent;
      color: #00d4ff;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      border: 2px solid rgba(0, 212, 255, 0.4);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: #00d4ff;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .grid-pattern {
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .noise-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    .canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .service-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .service-card:hover {
      transform: translateY(-8px);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .service-card:hover .service-icon {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
    }

    .service-icon {
      transition: all 0.4s ease;
    }

    .stat-number {
      font-variant-numeric: tabular-nums;
    }

    .nav-link {
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;
    const { motion, useScroll, useTransform, useInView, AnimatePresence } = window["Motion"];

    // ============================================
    // COMPONENT 1: Animated Shader Hero
    // ============================================
    const useShaderBackground = () => {
      const canvasRef = useRef(null);
      const animationFrameRef = useRef();
      const rendererRef = useRef(null);
      const pointersRef = useRef(null);

      class WebGLRenderer {
        constructor(canvas, scale) {
          this.canvas = canvas;
          this.scale = scale;
          this.gl = canvas.getContext('webgl2');
          if (!this.gl) return;
          this.gl.viewport(0, 0, canvas.width * scale, canvas.height * scale);
          this.shaderSource = defaultShaderSource;
          this.mouseMove = [0, 0];
          this.mouseCoords = [0, 0];
          this.pointerCoords = [0, 0];
          this.nbrOfPointers = 0;

          this.vertexSrc = `#version 300 es
precision highp float;
in vec4 position;
void main(){gl_Position=position;}`;
          
          this.vertices = [-1, 1, -1, -1, 1, 1, 1, -1];
        }

        updateShader(source) {
          this.reset();
          this.shaderSource = source;
          this.setup();
          this.init();
        }

        updateMove(deltas) { this.mouseMove = deltas; }
        updateMouse(coords) { this.mouseCoords = coords; }
        updatePointerCoords(coords) { this.pointerCoords = coords; }
        updatePointerCount(nbr) { this.nbrOfPointers = nbr; }
        updateScale(scale) {
          this.scale = scale;
          this.gl.viewport(0, 0, this.canvas.width * scale, this.canvas.height * scale);
        }

        compile(shader, source) {
          const gl = this.gl;
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader error:', gl.getShaderInfoLog(shader));
          }
        }

        test(source) {
          let result = null;
          const gl = this.gl;
          const shader = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            result = gl.getShaderInfoLog(shader);
          }
          gl.deleteShader(shader);
          return result;
        }

        reset() {
          const gl = this.gl;
          if (this.program && !gl.getProgramParameter(this.program, gl.DELETE_STATUS)) {
            if (this.vs) { gl.detachShader(this.program, this.vs); gl.deleteShader(this.vs); }
            if (this.fs) { gl.detachShader(this.program, this.fs); gl.deleteShader(this.fs); }
            gl.deleteProgram(this.program);
          }
        }

        setup() {
          const gl = this.gl;
          this.vs = gl.createShader(gl.VERTEX_SHADER);
          this.fs = gl.createShader(gl.FRAGMENT_SHADER);
          this.compile(this.vs, this.vertexSrc);
          this.compile(this.fs, this.shaderSource);
          this.program = gl.createProgram();
          gl.attachShader(this.program, this.vs);
          gl.attachShader(this.program, this.fs);
          gl.linkProgram(this.program);
        }

        init() {
          const gl = this.gl;
          const program = this.program;
          this.buffer = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(this.vertices), gl.STATIC_DRAW);
          const position = gl.getAttribLocation(program, 'position');
          gl.enableVertexAttribArray(position);
          gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);
          program.resolution = gl.getUniformLocation(program, 'resolution');
          program.time = gl.getUniformLocation(program, 'time');
          program.move = gl.getUniformLocation(program, 'move');
          program.touch = gl.getUniformLocation(program, 'touch');
          program.pointerCount = gl.getUniformLocation(program, 'pointerCount');
          program.pointers = gl.getUniformLocation(program, 'pointers');
        }

        render(now = 0) {
          const gl = this.gl;
          const program = this.program;
          if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return;
          gl.clearColor(0, 0, 0, 1);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.useProgram(program);
          gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
          gl.uniform2f(program.resolution, this.canvas.width, this.canvas.height);
          gl.uniform1f(program.time, now * 1e-3);
          gl.uniform2f(program.move, ...this.mouseMove);
          gl.uniform2f(program.touch, ...this.mouseCoords);
          gl.uniform1i(program.pointerCount, this.nbrOfPointers);
          gl.uniform2fv(program.pointers, this.pointerCoords);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
      }

      class PointerHandler {
        constructor(element, scale) {
          this.scale = scale;
          this.active = false;
          this.pointers = new Map();
          this.lastCoords = [0, 0];
          this.moves = [0, 0];

          const map = (el, s, x, y) => [x * s, el.height - y * s];

          element.addEventListener('pointerdown', (e) => {
            this.active = true;
            this.pointers.set(e.pointerId, map(element, this.getScale(), e.clientX, e.clientY));
          });

          element.addEventListener('pointerup', (e) => {
            if (this.count === 1) this.lastCoords = this.first;
            this.pointers.delete(e.pointerId);
            this.active = this.pointers.size > 0;
          });

          element.addEventListener('pointerleave', (e) => {
            if (this.count === 1) this.lastCoords = this.first;
            this.pointers.delete(e.pointerId);
            this.active = this.pointers.size > 0;
          });

          element.addEventListener('pointermove', (e) => {
            if (!this.active) return;
            this.lastCoords = [e.clientX, e.clientY];
            this.pointers.set(e.pointerId, map(element, this.getScale(), e.clientX, e.clientY));
            this.moves = [this.moves[0] + e.movementX, this.moves[1] + e.movementY];
          });
        }

        getScale() { return this.scale; }
        updateScale(s) { this.scale = s; }
        get count() { return this.pointers.size; }
        get move() { return this.moves; }
        get coords() { return this.pointers.size > 0 ? Array.from(this.pointers.values()).flat() : [0, 0]; }
        get first() { return this.pointers.values().next().value || this.lastCoords; }
      }

      const resize = () => {
        if (!canvasRef.current) return;
        const canvas = canvasRef.current;
        const dpr = Math.max(1, 0.5 * window.devicePixelRatio);
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        if (rendererRef.current) rendererRef.current.updateScale(dpr);
      };

      const loop = (now) => {
        if (!rendererRef.current || !pointersRef.current) return;
        rendererRef.current.updateMouse(pointersRef.current.first);
        rendererRef.current.updatePointerCount(pointersRef.current.count);
        rendererRef.current.updatePointerCoords(pointersRef.current.coords);
        rendererRef.current.updateMove(pointersRef.current.move);
        rendererRef.current.render(now);
        animationFrameRef.current = requestAnimationFrame(loop);
      };

      useEffect(() => {
        if (!canvasRef.current) return;
        const canvas = canvasRef.current;
        const dpr = Math.max(1, 0.5 * window.devicePixelRatio);
        
        rendererRef.current = new WebGLRenderer(canvas, dpr);
        pointersRef.current = new PointerHandler(canvas, dpr);
        
        if (rendererRef.current && rendererRef.current.gl) {
          rendererRef.current.setup();
          rendererRef.current.init();
          resize();
          if (rendererRef.current.test(defaultShaderSource) === null) {
            rendererRef.current.updateShader(defaultShaderSource);
          }
          loop(0);
          window.addEventListener('resize', resize);
        }

        return () => {
          window.removeEventListener('resize', resize);
          if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
          if (rendererRef.current) rendererRef.current.reset();
        };
      }, []);

      return canvasRef;
    };

    const defaultShaderSource = `#version 300 es
precision highp float;
out vec4 O;
uniform vec2 resolution;
uniform float time;
#define FC gl_FragCoord.xy
#define T time
#define R resolution
#define MN min(R.x,R.y)

float rnd(vec2 p) {
  p=fract(p*vec2(12.9898,78.233));
  p+=dot(p,p+34.56);
  return fract(p.x*p.y);
}

float noise(in vec2 p) {
  vec2 i=floor(p), f=fract(p), u=f*f*(3.-2.*f);
  float a=rnd(i), b=rnd(i+vec2(1,0)), c=rnd(i+vec2(0,1)), d=rnd(i+1.);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}

float fbm(vec2 p) {
  float t=.0, a=1.; mat2 m=mat2(1.,-.5,.2,1.2);
  for (int i=0; i<5; i++) {
    t+=a*noise(p);
    p*=2.*m;
    a*=.5;
  }
  return t;
}

float clouds(vec2 p) {
  float d=1., t=.0;
  for (float i=.0; i<3.; i++) {
    float a=d*fbm(i*10.+p.x*.2+.2*(1.+i)*p.y+d+i*i+p);
    t=mix(t,d,a);
    d=a;
    p*=2./(i+1.);
  }
  return t;
}

void main(void) {
  vec2 uv=(FC-.5*R)/MN,st=uv*vec2(2,1);
  vec3 col=vec3(0);
  float bg=clouds(vec2(st.x+T*.5,-st.y));
  uv*=1.-.3*(sin(T*.2)*.5+.5);
  for (float i=1.; i<12.; i++) {
    uv+=.1*cos(i*vec2(.1+.01*i, .8)+i*i+T*.5+.1*uv.x);
    vec2 p=uv;
    float d=length(p);
    col+=.00125/d*(cos(sin(i)*vec3(1,2,3))+1.);
    float b=noise(i+p+bg*1.731);
    col+=.002*b/length(max(p,vec2(b*p.x*.02,p.y)));
    col=mix(col,vec3(bg*.05,bg*.15,bg*.3),d);
  }
  O=vec4(col,1);
}`;

    const Hero = ({ trustBadge, headline, subtitle, buttons, className = "" }) => {
      const canvasRef = useShaderBackground();

      return (
        <div className={`relative w-full h-screen overflow-hidden ${className}`}>
          <canvas
            ref={canvasRef}
            className="absolute inset-0 w-full h-full touch-none"
            style={{ background: '#050510' }}
          />
          
          <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#050510] pointer-events-none" />
          <div className="absolute inset-0 bg-gradient-to-r from-[#050510]/80 via-transparent to-[#050510]/80 pointer-events-none" />

          <div className="absolute inset-0 z-10 flex flex-col items-center justify-center text-white px-4">
            {trustBadge && (
              <motion.div 
                className="mb-8"
                initial={{ opacity: 0, y: -20 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.8 }}
              >
                <div className="flex items-center gap-3 px-6 py-3 glass rounded-full text-sm">
                  {trustBadge.icons && (
                    <div className="flex gap-1">
                      {trustBadge.icons.map((icon, idx) => (
                        <span key={idx} className="text-cyan-300">{icon}</span>
                      ))}
                    </div>
                  )}
                  <span className="text-cyan-100">{trustBadge.text}</span>
                  <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
                </div>
              </motion.div>
            )}

            <div className="text-center space-y-6 max-w-5xl mx-auto">
              <motion.div 
                className="space-y-2"
                initial={{ opacity: 0, y: 30 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.8, delay: 0.2 }}
              >
                <h1 className="text-5xl md:text-7xl lg:text-8xl font-bold font-display gradient-text">
                  {headline.line1}
                </h1>
                <h1 className="text-5xl md:text-7xl lg:text-8xl font-bold font-display gradient-text-warm">
                  {headline.line2}
                </h1>
              </motion.div>
              
              <motion.p 
                className="max-w-3xl mx-auto text-lg md:text-xl lg:text-2xl text-gray-300 font-light leading-relaxed"
                initial={{ opacity: 0, y: 30 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.8, delay: 0.4 }}
              >
                {subtitle}
              </motion.p>
              
              {buttons && (
                <motion.div 
                  className="flex flex-col sm:flex-row gap-4 justify-center mt-10"
                  initial={{ opacity: 0, y: 30 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ duration: 0.8, delay: 0.6 }}
                >
                  {buttons.primary && (
                    <button onClick={buttons.primary.onClick} className="btn-primary text-lg">
                      {buttons.primary.text}
                    </button>
                  )}
                  {buttons.secondary && (
                    <button onClick={buttons.secondary.onClick} className="btn-secondary text-lg">
                      {buttons.secondary.text}
                    </button>
                  )}
                </motion.div>
              )}
            </div>

            <motion.div 
              className="absolute bottom-10 left-1/2 -translate-x-1/2"
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              transition={{ delay: 1.2 }}
            >
              <motion.div 
                className="w-6 h-10 rounded-full border-2 border-cyan-400/50 flex justify-center pt-2"
                animate={{ y: [0, 8, 0] }}
                transition={{ repeat: Infinity, duration: 2 }}
              >
                <div className="w-1.5 h-3 rounded-full bg-cyan-400" />
              </motion.div>
            </motion.div>
          </div>
        </div>
      );
    };

    // ============================================
    // COMPONENT 2: Container Scroll Animation
    // ============================================
    const ContainerScroll = ({ titleComponent, children }) => {
      const containerRef = useRef(null);
      const { scrollYProgress } = useScroll({ target: containerRef });
      const [isMobile, setIsMobile] = useState(false);

      useEffect(() => {
        const checkMobile = () => setIsMobile(window.innerWidth <= 768);
        checkMobile();
        window.addEventListener("resize", checkMobile);
        return () => window.removeEventListener("resize", checkMobile);
      }, []);

      const scaleDimensions = () => isMobile ? [0.7, 0.9] : [1.05, 1];
      const rotate = useTransform(scrollYProgress, [0, 1], [20, 0]);
      const scale = useTransform(scrollYProgress, [0, 1], scaleDimensions());

    // ============================================
    // COMPONENT 3: Shader Animation
    // ============================================
    const ShaderAnimation = ({ height = "400px" }) => {
      const canvasRef = useRef(null);
      const animationRef = useRef(null);
      const mouseRef = useRef({ x: 0.5, y: 0.5 });

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return;

        const vertexShaderSource = `
          attribute vec2 a_position;
          void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
          }
        `;

        const fragmentShaderSource = `
          precision mediump float;
          uniform vec2 u_resolution;
          uniform float u_time;
          uniform vec2 u_mouse;
          
          vec3 palette(float t) {
            vec3 a = vec3(0.05, 0.1, 0.2);
            vec3 b = vec3(0.0, 0.5, 0.8);
            vec3 c = vec3(1.0, 1.0, 1.0);
            vec3 d = vec3(0.0, 0.33, 0.67);
            return a + b * cos(6.28318 * (c * t + d));
          }
          
          void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 uv0 = uv;
            uv = uv * 2.0 - 1.0;
            uv.x *= u_resolution.x / u_resolution.y;
            
            vec3 col = vec3(0.02, 0.03, 0.08);
            
            for(float i = 0.0; i < 4.0; i++) {
              uv = fract(uv * 1.5) - 0.5;
              float d = length(uv) * exp(-length(uv0));
              vec3 color = palette(length(uv0) + i * 0.4 + u_time * 0.02);
              d = sin(d * 4.0 + u_time) / 36.0;
              d = pow(0.005 / abs(d), 1.5);
              
              vec2 mouseEffect = u_mouse - uv0;
              float mouseDist = length(mouseEffect);
              d *= 1.0 + sin(mouseDist * 10.0 - u_time * 2.0) * 0.15;
              
              col += color * d * 0.5;
            }
            
            gl_FragColor = vec4(col, 1.0);
          }
        `;

        function createShader(type, source) {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          return shader;
        }

        const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'a_position');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const mouseLocation = gl.getUniformLocation(program, 'u_mouse');

        const handleResize = () => {
          const rect = canvas.parentElement.getBoundingClientRect();
          canvas.width = rect.width;
          canvas.height = rect.height;
          gl.viewport(0, 0, canvas.width, canvas.height);
        };

        handleResize();
        window.addEventListener('resize', handleResize);

        const handleMouseMove = (e) => {
          const rect = canvas.getBoundingClientRect();
          mouseRef.current.x = (e.clientX - rect.left) / rect.width;
          mouseRef.current.y = 1.0 - (e.clientY - rect.top) / rect.height;
        };

        canvas.addEventListener('mousemove', handleMouseMove);

        let startTime = Date.now();

        const render = () => {
          const currentTime = (Date.now() - startTime) * 0.001;
          gl.clearColor(0.02, 0.03, 0.08, 1);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.useProgram(program);
          gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
          gl.enableVertexAttribArray(positionLocation);
          gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
          gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
          gl.uniform1f(timeLocation, currentTime);
          gl.uniform2f(mouseLocation, mouseRef.current.x, mouseRef.current.y);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          animationRef.current = requestAnimationFrame(render);
        };

        render();

        return () => {
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
          window.removeEventListener('resize', handleResize);
          canvas.removeEventListener('mousemove', handleMouseMove);
        };
      }, []);

      return (
        <div className="w-full rounded-2xl overflow-hidden" style={{ height }}>
          <canvas ref={canvasRef} className="w-full h-full" />
        </div>
      );
    };

                    </div>
                    <div className="text-center lg:text-left">
                      <h3 className="font-display font-bold text-2xl text-white">Tanishk Sharpunya</h3>
                      <p className="text-cyan-400 font-medium">Founder & Visionary Builder</p>
                    </div>
                  </div>

                  {/* Right: Bio Text */}
                  <div className="flex-1 space-y-6">
                    <h2 className="font-display font-bold text-3xl md:text-4xl text-white">
                      Building the Future,{' '}
                      <span className="gradient-text">One Project at a Time</span>
                    </h2>
                    
                    <p className="text-lg text-gray-300 leading-relaxed">
                      At just 15 years old, I'm on a mission to build practical technology solutions 
                      that make a real difference. My journey started with an insatiable curiosity 
                      about how things work — now I'm building them.
                    </p>
                    
                    <p className="text-gray-400 leading-relaxed">
                      From Machine Learning theory to hands-on cybersecurity, from mathematics to 
                      full-stack development — I believe in learning by doing. Every project is an 
                      opportunity to push boundaries and create something meaningful.
                    </p>

                    {/* Skills Tags */}
                    <div>
                      <h4 className="text-sm font-semibold text-gray-300 mb-3">Core Competencies</h4>
                      <div className="flex flex-wrap gap-2">
                        {skills.map((skill, i) => (
                          <span
                            key={i}
                            className="px-3 py-1.5 rounded-lg text-sm bg-velorex-bg border border-velorex-border text-gray-300 hover:border-cyan-500/50 hover:text-cyan-400 transition-colors cursor-default"
                          >
                            {skill}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Stats Grid */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                {stats.map((stat, i) => (
                  <motion.div
                    key={i}
                    className="glass rounded-2xl p-6 text-center"
                    initial={{ opacity: 0, y: 20 }}
                    animate={isInView ? { opacity: 1, y: 0 } : {}}
                    transition={{ duration: 0.6, delay: 0.2 + i * 0.1 }}
                  >
                    <div className="stat-number font-display font-bold text-3xl md:text-4xl gradient-text mb-1">
                      {stat.value}{stat.suffix}
                    </div>
                    <div className="text-sm text-gray-400">{stat.label}</div>
                  </motion.div>
                ))}
              </div>

              {/* Certifications Card */}
              <motion.div
                className="glass rounded-2xl p-6"
                initial={{ opacity: 0, y: 20 }}
                animate={isInView ? { opacity: 1, y: 0 } : {}}
                transition={{ duration: 0.6, delay: 0.6 }}
              >
                <h4 className="text-sm font-semibold text-gray-300 mb-4 flex items-center gap-2">
                  <Icons.Star /> Certifications & Learning Journey
                </h4>
                <div className="grid sm:grid-cols-2 gap-3">
                  {[
                    'Google Professional Certificates',
                    'Infosys Springboard Programs',
                    'Cybersecurity Training',
                    'Mathematics for ML (Stanford)',
                    'VC Dimension & PAC Learning',
                    'Biology & Science Self-Study'
                  ].map((cert, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 rounded-xl bg-velorex-bg/50">
                      <div className="w-8 h-8 rounded-lg bg-cyan-500/10 flex items-center justify-center text-cyan-400 flex-shrink-0">
                        <Icons.CheckCircle />
                      </div>
                      <span className="text-sm text-gray-300">{cert}</span>
                    </div>
                  ))}
                </div>
              </motion.div>
            </motion.div>
          </div>
        </section>
      );
    };

    // ============================================
    // SHOWCASE SECTION (with Scroll Animation)
    // ============================================
    const ShowcaseSection = () => {
      return (
        <section id="showcase" className="py-24 md:py-32 relative grid-pattern">
          <ContainerScroll
            titleComponent={
              <div className="space-y-4">
                <span className="inline-block px-4 py-1.5 rounded-full text-xs font-semibold tracking-wider uppercase bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">
                  Live Showcase
                </span>
                <h2 className="font-display font-bold text-4xl md:text-5xl lg:text-6xl text-white">
                  Experience Our{' '}
                  <span className="gradient-text">Technology</span>
                </h2>
                <p className="text-lg text-gray-400 max-w-2xl mx-auto">
                  Scroll down to see our interactive shader technology in action — 
                  real-time WebGL rendering powered by custom GLSL shaders.
                </p>
              </div>
            }
          >
            <div className="relative w-full h-full">
              <ShaderAnimation height="100%" />
              <div className="absolute bottom-6 left-6 right-6 glass-strong rounded-xl p-4">
                <div className="flex items-center justify-between">
                  <div>
                    <p className="font-semibold text-white">Interactive Shader Demo</p>
                    <p className="text-sm text-gray-400">Move your cursor to interact</p>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
                    <span className="text-sm text-emerald-400">Live</span>
                  </div>
                </div>
              </div>
            </div>
          </ContainerScroll>
        </section>
      );
    };

    // ============================================
    // CTA / CONTACT SECTION
    // ============================================
    const ContactSection = () => {
      const sectionRef = useRef(null);
      const isInView = useInView(sectionRef, { once: true, margin: "-100px" });
      const [formData, setFormData] = useState({ name: '', email: '', message: '' });

      const handleSubmit = (e) => {
        e.preventDefault();
        alert('Thank you for your interest! We will get back to you soon.');
        setFormData({ name: '', email: '', message: '' });
      };

      return (
        <section id="contact" className="py-24 md:py-32 relative overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-b from-velorex-bg via-velorex-surface to-velorex-bg" />
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-cyan-500/5 rounded-full blur-3xl" />

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div className="grid lg:grid-cols-2 gap-16">
              <motion.div
                ref={sectionRef}
                initial={{ opacity: 0, x: -50 }}
                animate={isInView ? { opacity: 1, x: 0 } : {}}
                transition={{ duration: 0.8 }}
              >
                <span className="inline-block px-4 py-1.5 rounded-full text-xs font-semibold tracking-wider uppercase bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 mb-4">
                  Get In Touch
                </span>
                
                <h2 className="font-display font-bold text-4xl md:text-5xl text-white mb-6">
                  Ready to Build Something{' '}
                  <span className="gradient-text">Amazing?</span>
                </h2>
                
                <p className="text-lg text-gray-400 leading-relaxed mb-8">
                  Whether you need an AI solution, a web application, or want to discuss 
                  the future of technology — I'd love to hear from you.
                </p>

                <div className="space-y-4 mb-8">
                  <a href="mailto:velorxtech@gmail.com" className="flex items-center gap-4 p-4 glass rounded-xl hover:border-cyan-500/30 transition-colors group">
                    <div className="w-12 h-12 rounded-xl bg-cyan-500/10 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors">
                      <Icons.Mail />
                    </div>
                    <div>
                      <p className="text-sm text-gray-400">Email</p>
                      <p className="text-white font-medium">velorxtech@gmail.com</p>
                    </div>
                  </a>
                  
                  <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-4 glass rounded-xl hover:border-cyan-500/30 transition-colors group">
                    <div className="w-12 h-12 rounded-xl bg-cyan-500/10 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors">
                      <Icons.Linkedin />
                    </div>
                    <div>
                      <p className="text-sm text-gray-400">LinkedIn</p>
                      <p className="text-white font-medium">Connect professionally</p>
                    </div>
                  </a>
                </div>

                <div className="flex gap-4">
                  <a href="#" className="w-12 h-12 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-cyan-400 hover:border-cyan-500/30 transition-colors">
                    <Icons.Github />
                  </a>
                  <a href="#" className="w-12 h-12 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-cyan-400 hover:border-cyan-500/30 transition-colors">
                    <Icons.Linkedin />
                  </a>
                </div>
              </motion.div>

              <motion.div
                initial={{ opacity: 0, x: 50 }}
                animate={isInView ? { opacity: 1, x: 0 } : {}}
                transition={{ duration: 0.8, delay: 0.2 }}
              >
                <form onSubmit={handleSubmit} className="glass-strong rounded-2xl p-8 space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">Name</label>
                    <input
                      type="text"
                      value={formData.name}
                      onChange={(e) => setFormData({...formData, name: e.target.value})}
                      className="w-full px-4 py-3 rounded-xl bg-velorex-bg border border-velorex-border text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-colors"
                      placeholder="Your name"
                      required
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input
                      type="email"
                      value={formData.email}
                      onChange={(e) => setFormData({...formData, email: e.target.value})}
                      className="w-full px-4 py-3 rounded-xl bg-velorex-bg border border-velorex-border text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-colors"
                      placeholder="your@email.com"
                      required
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">Message</label>
                    <textarea
                      value={formData.message}
                      onChange={(e) => setFormData({...formData, message: e.target.value})}
                      rows={4}
                      className="w-full px-4 py-3 rounded-xl bg-velorex-bg border border-velorex-border text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-colors resize-none"
                      placeholder="Tell me about your project..."
                      required
                    />
                  </div>
                  
                  <button type="submit" className="btn-primary w-full flex items-center justify-center gap-2">
                    Send Message
                    <Icons.ArrowRight />
                  </button>
                </form>
              </motion.div>
            </div>
          </div>
        </section>
      );
    };

    // ============================================
    // FOOTER
    // ============================================
    const Footer = () => {
      return (
        <footer className="py-12 border-t border-velorex-border">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-violet-600 flex items-center justify-center font-bold text-white">
                  V
                </div>
                <span className="font-display font-bold text-xl text-white">
                  Velorex<span className="text-cyan-400">Tech</span>
                </span>
              </div>
              
              <p className="text-sm text-gray-500 text-center">
                Building the future of technology, one project at a time.
              </p>
              
              <p className="text-sm text-gray-500">
                Founded by Tanishk Sharpunya
              </p>
            </div>
          </div>
        </footer>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    const App = () => {
      return (
        <div className="min-h-screen bg-velorex-bg text-white">
          <Navigation />
          
          <Hero
            trustBadge={{
              text: "Trusted by forward-thinking teams worldwide",
              icons: ["✨", "🚀"]
            }}
            headline={{
              line1: "Build With",
              line2: "Velorex Tech"
            }}
            subtitle="AI-powered solutions, cutting-edge cybersecurity, and transformative web experiences — engineered for the next generation."
            buttons={{
              primary: {
                text: "Start Your Project",
                onClick: () => document.getElementById('contact').scrollIntoView({ behavior: 'smooth' })
              },
              secondary: {
                text: "Explore Services",
                onClick: () => document.getElementById('services').scrollIntoView({ behavior: 'smooth' })
              }
            }}
          />

          <ServicesSection />

          <AboutSection />

          <ShowcaseSection />

          <section className="py-24 relative">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <h2 className="font-display font-bold text-3xl md:text-4xl text-white mb-4">
                  Real-Time <span className="gradient-text">Visual Computing</span>
                </h2>
                <p className="text-gray-400 max-w-2xl mx-auto">
                  Our shader technology enables stunning real-time graphics and interactive visualizations.
                </p>
              </div>
              <ShaderAnimation height="450px" />
            </div>
          </section>

          <ContactSection />

          <Footer />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
